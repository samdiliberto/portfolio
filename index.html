<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samuel Di Liberto — Work</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Figtree:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  /* ============================================================
     DESIGN TOKENS — tweak the whole look from here
     ============================================================ */
  :root {
    --bg: #f3f3f3;                            /* clean flat neutral background */
    --card-bg: #ffffff;
    --card-border: #e4e4e1;
    --card-border-hover: #c9c9c5;
    --ink: #161616;
    --ink-soft: #6f6f6c;
    --line: rgba(210, 96, 80, 0.45);           /* bezier connection colour */
    --line-hover: rgba(210, 96, 80, 0.95);
    /* gradient (header bars + wires) — #BBE8F9 → #C0FFB3 */
    --bar-gradient: linear-gradient(90deg, #BBE8F9, #C0FFB3);
    --radius: 0px;                             /* sharp square edges throughout */
    --node-size: 160px;
    --node-pad: 5px;                           /* gutter inside each neuron */
    --font: "Helvetica Neue", Helvetica, Arial, sans-serif;       /* headings / site */
    --font-card: "Aspekta", "Inter", "Helvetica Neue", sans-serif; /* card text */
    --font-page: "Aspekta", "Figtree", "Helvetica Neue", sans-serif; /* work pages */
    --page-gap: clamp(90px, 14vh, 160px);      /* equidistant section rhythm */
  }

  /* Aspekta — the face from the mockups (files in ./fonts/) */
  @font-face {
    font-family: "Aspekta";
    src: url("fonts/Aspekta-300.ttf") format("truetype");
    font-weight: 300;
    font-display: swap;
  }
  @font-face {
    font-family: "Aspekta";
    src: url("fonts/Aspekta-400.ttf") format("truetype");
    font-weight: 400;
    font-display: swap;
  }
  @font-face {
    font-family: "Aspekta";
    src: url("fonts/Aspekta-500.ttf") format("truetype");
    font-weight: 500;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    font-family: var(--font);
    color: var(--ink);
    background: var(--bg);
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ============================================================
     HEADER — swiss rules between items
     ============================================================ */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 72px;
    display: flex;
    align-items: center;
    padding: 0 40px;
    gap: 24px;
    z-index: 200;                /* stays on top of work pages */
    background: var(--bg);
    transition: transform .35s ease;
  }
  header.hidden { transform: translateY(-100%); }
  header .rule {
    flex: 1;
    height: 3px;
    border-radius: 0;              /* square ends */
    background: var(--bar-gradient);
  }
  header .rule.short { flex: 0.35; }
  header a, header span.name {
    font-family: var(--font-page);   /* same face as the copy, just smaller */
    font-size: 14px;
    font-weight: 400;
    letter-spacing: -0.01em;
    text-decoration: none;
    color: var(--ink);
    white-space: nowrap;
    cursor: pointer;
  }
  /* subtle grey pill — hover + active selection indicator */
  header a {
    padding: 6px 14px;
    border-radius: 8px;
    transition: background .2s;
  }
  header a:hover { background: rgba(0,0,0,0.045); }
  header a.active { background: rgba(0,0,0,0.06); }

  /* ============================================================
     NETWORK STAGE
     ============================================================ */
  #stage {
    position: absolute;
    inset: 72px 0 0 0;
  }
  #wires {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }
  /* wires pick up the nav-bar gradient across the stage */
  #wires path {
    fill: none;
    stroke: url(#wireGrad);
    stroke-width: 1.25;
    opacity: 0.55;
    transition: opacity .25s, stroke-width .25s;
  }
  #wires path.lit {
    opacity: 1;
    stroke-width: 2;
  }

  /* ============================================================
     NEURON CARDS — flat, no drop shadow
     ============================================================ */
  .neuron {
    position: absolute;
    width: var(--node-size);
    height: var(--node-size);
    cursor: pointer;
    animation: float 6s ease-in-out infinite;
    will-change: transform;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(-7px); }
  }
  /* full-bleed image card, generous radius (twelvelabs-style) */
  .neuron .card {
    position: relative;
    width: 100%;
    height: 100%;
    background: var(--card-bg);
    border-radius: var(--radius);
    overflow: hidden;
    transition: transform .3s;
  }
  .neuron:hover .card {
    transform: translateY(-3px);
  }
  /* title as a thin outlined pill on the image */
  .neuron .head {
    position: absolute;
    top: 10px;
    left: 10px;
    max-width: calc(100% - 20px);
    z-index: 2;
  }
  .neuron .head .t {
    font-family: var(--font-card);
    font-size: 9.5px;
    letter-spacing: -0.015em;
    line-height: 1.4;
    color: rgba(25,25,25,0.85);
    display: inline-block;
    max-width: 100%;
    box-sizing: border-box;
    padding: 4px 10px;
    border: 1px solid rgba(25,25,25,0.6);
    border-radius: 0;
    white-space: normal;          /* long titles wrap, no ellipsis */
    transition: color .3s, border-color .3s;
  }
  /* set automatically when the image behind the title is dark */
  .neuron.dark-img .head .t {
    color: rgba(255,255,255,0.95);
    border-color: rgba(255,255,255,0.7);
  }
  .neuron .head .n { display: none; }
  .neuron .thumb {
    position: absolute;
    inset: 0;
  }
  .neuron .thumb img,
  .neuron .thumb .grad {
    position: absolute;
    inset: -12px;                 /* bleed so the blur has no hard edge */
    width: calc(100% + 24px);
    height: calc(100% + 24px);
    object-fit: cover;
    filter: blur(7px);
  }
  /* ============================================================
     HOVER DETAIL CARD — bottom left
     ============================================================ */
  #detail {
    position: fixed;
    left: 40px;
    bottom: 40px;
    width: 260px;
    font-family: var(--font-card);
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 8px;
    z-index: 60;
    opacity: 0;
    transform: translateY(16px);
    pointer-events: none;
    transition: opacity .3s ease, transform .3s ease;
  }
  #detail.show { opacity: 1; transform: translateY(0); }
  #detail .head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 10px;
    padding: 10px 12px 12px;
    border-bottom: 1px solid var(--card-border);
  }
  #detail .head .t {
    font-size: 11.5px;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
  }
  #detail .head .n {
    font-size: 26px;
    font-weight: 200;
    color: rgba(30,30,30,0.4);
    flex-shrink: 0;
  }
  #detail .img {
    position: relative;
    height: 260px;
    margin-top: 8px;
    border-radius: calc(var(--radius) - 4px);
    overflow: hidden;
  }
  #detail .img img, #detail .img .grad {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
  }
  #detail .desc {
    padding: 14px 12px;
    font-size: 11.5px;
    line-height: 1.65;
    color: var(--ink-soft);
    letter-spacing: 0.01em;
  }

  /* ============================================================
     PROJECT OVERLAY — click to expand
     ============================================================ */
  #overlay {
    position: fixed;
    inset: 0;
    z-index: 90;                 /* sits under the header — nav stays visible */
    background: var(--bg);
    display: none;
    overflow-y: auto;
  }
  #overlay.show { display: block; }
  /* home network is hidden while a page is open — feels like navigation */
  body.page-open #stage, body.page-open #detail { display: none; }
  #overlay .inner {
    font-family: var(--font-page);
    /* flush-left like the home page — no centring */
    padding: 0 40px 60px;
  }
  /* title left, client caption on the 82% grid column */
  #overlay .topline {
    position: relative;
    padding-top: 30vh;
    /* title → body gap, as per design */
    margin-bottom: clamp(90px, 11vh, 120px);
  }
  #overlay .topline h1 {
    font-size: clamp(20px, 2.8vw, 38px);   /* same size as body copy */
    font-weight: 300;                      /* cohesive with body — not bold */
    letter-spacing: -0.02em;               /* -2%, same as body */
    line-height: 1.05;
    color: #000;
  }
  #overlay .topline .client {
    position: absolute;
    left: 82%;
    bottom: 0.35em;
    font-size: 16px;
    letter-spacing: 0;                 /* captions: 0% tracking */
    color: var(--ink-soft);
  }
  /* body copy — random.studio scale, -1% tracking, full black */
  #overlay .section-text {
    font-size: clamp(20px, 2.8vw, 38px);
    font-weight: 300;
    line-height: 1.26;
    letter-spacing: -0.02em;
    color: #000;
    max-width: 86%;
    margin: 0 0 var(--page-gap);
  }
  #overlay .section-text strong { font-weight: 500; }
  #overlay .section-text p + p { margin-top: 1em; }
  #overlay .section-text a { color: var(--ink); }
  /* section heading line inside a text block (random.studio-style) */
  #overlay .sec-head {
    display: block;
    font-weight: 400;
    margin-bottom: 0.55em;
  }
  /* credits list — For / Year / Role / With */
  #overlay .credits {
    max-width: 640px;
    margin: 0 0 var(--page-gap);
    font-size: 13px;
    line-height: 1.6;
    letter-spacing: 0;
  }
  #overlay .credits .row {
    display: grid;
    grid-template-columns: 110px 1fr;
    gap: 20px;
    padding: 12px 0;
    border-top: 1px solid rgba(0,0,0,0.12);
  }
  #overlay .credits .row:last-child { border-bottom: 1px solid rgba(0,0,0,0.12); }
  #overlay .credits .k { color: var(--ink-soft); }
  #overlay .credits .v { color: var(--ink); }
  /* about page: same voice as project copy, centred column (random-style) */
  #overlay .section-text.about {
    max-width: min(760px, 78%);
    margin: 0 auto var(--page-gap);
  }
  /* smaller reading copy (about page) */
  #overlay .section-text.small {
    font-size: 16px;
    line-height: 1.8;
    letter-spacing: -0.01em;
    color: var(--ink-soft);
    max-width: 640px;
  }
  /* full-width media blocks */
  #overlay .media {
    position: relative;
    overflow: hidden;
    margin: 0 0 var(--page-gap);
    background: transparent;      /* media sits directly on the page bg */
  }
  #overlay .media img,
  #overlay .media video { display: block; width: 100%; height: auto; }
  /* standalone media (not the bleed hero, not grid tiles): always fully
     visible on screen — never taller than the viewport, never cropped */
  #overlay .inner > .media:not(.bleed) img,
  #overlay .inner > .media:not(.bleed) video {
    width: auto;
    max-width: 100%;
    max-height: 86vh;
    margin: 0 auto;
  }
  /* dynamic rhythm: standalone media alternates left / right */
  #overlay .inner > .media.alt-left img,
  #overlay .inner > .media.alt-left video { margin-left: 0; }
  #overlay .inner > .media.alt-right img,
  #overlay .inner > .media.alt-right video { margin-right: 0; }
  /* edge: the media block bleeds past the page padding to touch the edge */
  #overlay .inner > .media.alt-left.edge { margin-left: -40px; }
  #overlay .inner > .media.alt-right.edge { margin-right: -40px; }
  #overlay .media .grad { display: block; width: 100%; height: 64vh; }
  /* sound toggle on videos */
  .sound-btn {
    position: absolute;
    left: 14px;
    bottom: 14px;
    z-index: 3;
    font: 400 11px/1 var(--font-card, sans-serif);
    letter-spacing: 0.06em;
    padding: 8px 14px;
    color: #fff;
    background: rgba(20, 20, 20, 0.35);
    border: 1px solid rgba(255, 255, 255, 0.65);
    border-radius: 999px;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    cursor: pointer;
    transition: background 0.2s ease;
  }
  .sound-btn:hover, .sound-btn.on { background: rgba(20, 20, 20, 0.6); }
  /* full-bleed: breaks out of the container to viewport edges */
  #overlay .media.bleed {
    width: 100vw;
    margin-left: calc(50% - 50vw);
  }
  /* hero: full bleed to the sides at natural ratio (no crop) */
  #overlay .media.bleed img,
  #overlay .media.bleed video {
    width: 100%;
    height: auto;
  }
  /* opt-in banner crop for tall/square heroes (heroCrop: true) */
  #overlay .media.bleed.crop img,
  #overlay .media.bleed.crop video {
    height: 88vh;
    object-fit: cover;
  }
  #overlay .media.bleed .grad { height: 86vh; }
  /* equal-column grid */
  #overlay .media-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 28px;
    margin: 0 0 var(--page-gap);
  }
  #overlay .media-grid.cols-2 { grid-template-columns: repeat(2, 1fr); }
  #overlay .media-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
  #overlay .media-grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
  #overlay .media-grid.cols-5 { grid-template-columns: repeat(5, 1fr); }
  /* cols-6: tiles sized as a 6-column grid, but the outer columns are
     removed — 4 tiles per row, inset by one tile-width on each side,
     extra tiles wrapping onto new rows at the same size */
  #overlay .media-grid.cols-6 {
    grid-template-columns: repeat(4, 1fr);
    padding: 0 calc((100% + 14px) / 6);
  }
  /* denser gutters on gallery grids */
  #overlay .media-grid.cols-3, #overlay .media-grid.cols-4 { gap: 20px; }
  #overlay .media-grid.cols-5, #overlay .media-grid.cols-6 { gap: 14px; }
  /* gallery tiles are uniform squares — odd ratios crop to fit */
  #overlay .media-grid.cols-3 .media img, #overlay .media-grid.cols-3 .media video,
  #overlay .media-grid.cols-4 .media img, #overlay .media-grid.cols-4 .media video,
  #overlay .media-grid.cols-5 .media img, #overlay .media-grid.cols-5 .media video,
  #overlay .media-grid.cols-6 .media img, #overlay .media-grid.cols-6 .media video {
    width: 100%;
    aspect-ratio: 1 / 1;
    height: auto;
    object-fit: cover;
  }
  #overlay .media-grid .media { margin: 0; }
  #overlay .media-grid .media .grad { height: 340px; }
  /* staggered pair (random.studio-style) —
     first image large at top-left, second smaller and lower right */
  #overlay .media-duo {
    display: grid;
    grid-template-columns: repeat(12, 1fr);
    gap: 28px;
    align-items: start;
    margin: 0 0 var(--page-gap);
  }
  #overlay .media-duo .media { margin: 0; background: transparent; }
  /* fully visible: never taller than the viewport, keep natural ratio */
  #overlay .media-duo .media img,
  #overlay .media-duo .media video {
    width: auto;
    max-width: 100%;
    max-height: 88vh;
  }
  /* pair stays together: large from the left edge, small right beside it */
  #overlay .media-duo .media:nth-child(1) {
    grid-column: 1 / 7;
    margin-left: -40px;            /* touches the left edge */
  }
  #overlay .media-duo .media:nth-child(2) {
    grid-column: 7 / 12;
    margin-top: 14vh;
  }
  #overlay .media-duo .media:nth-child(1) .grad { height: 74vh; }
  #overlay .media-duo .media:nth-child(2) .grad { height: 50vh; }
  /* flip: mirrored — large from the right edge, small beside it lower */
  #overlay .media-duo.flip .media:nth-child(1) {
    grid-column: 7 / 13;
    order: 2;
    margin-left: 0;
    margin-right: -40px;
  }
  #overlay .media-duo.flip .media:nth-child(1) img,
  #overlay .media-duo.flip .media:nth-child(1) video { margin-left: auto; }
  #overlay .media-duo.flip .media:nth-child(2) {
    grid-column: 2 / 7;
    margin-top: 14vh;
    order: 1;
  }
  #overlay .media-duo.flip .media:nth-child(2) img,
  #overlay .media-duo.flip .media:nth-child(2) video { margin-left: auto; }
  /* next-project footer */
  #overlay .next {
    margin-top: 96px;
    border-top: 1px solid var(--ink);
    padding-top: 22px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 24px;
  }
  #overlay .next .label {
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-soft);
  }
  #overlay .next a {
    font-size: clamp(22px, 2.5vw, 34px);
    font-weight: 300;
    letter-spacing: -0.01em;
    color: var(--ink);
    text-decoration: none;
    cursor: pointer;
    transition: opacity .2s;
  }
  #overlay .next a:hover { opacity: 0.45; }
  #overlay .close {
    position: fixed;
    top: 26px;
    right: 40px;
    font-size: 13px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    background: none;
    border: none;
    font-family: var(--font);
    color: var(--ink);
  }
  #overlay .close:hover { opacity: 0.45; }

  /* ============================================================
     MOBILE — the neural network is replaced by a tendril-style
     stacked index: full-width media + small caption row
     ============================================================ */
  #mobile-home { display: none; }
  @media (max-width: 820px) {
    #stage, #detail { display: none; }
    header { padding: 0 16px; gap: 10px; }
    header a, header span.name { font-size: 12px; }
    header a { padding: 5px 9px; }

    #mobile-home {
      display: block;
      position: absolute;
      inset: 72px 0 0 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 10px 16px 60px;
    }
    .m-tile { margin-bottom: 44px; cursor: pointer; }
    .m-tile .m-media img,
    .m-tile .m-media .grad {
      display: block;
      width: 100%;
      aspect-ratio: 4 / 3;
      height: auto;
      object-fit: cover;
    }
    .m-cap {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 12px;
      margin-top: 10px;
      font-family: var(--font-page);
    }
    .m-cap .m-t { font-size: 14px; letter-spacing: -0.01em; color: var(--ink); }
    .m-cap .m-c { font-size: 12px; color: var(--ink-soft); white-space: nowrap; }

    /* work pages relax onto a single column */
    #overlay .inner { padding: 0 16px 48px; }
    #overlay .topline { padding-top: 18vh; margin-bottom: 64px; }
    #overlay .topline .client { position: static; display: block; margin-top: 10px; }
    #overlay .section-text { max-width: 100%; }
    #overlay .inner > .media:not(.bleed) img,
    #overlay .inner > .media:not(.bleed) video {
      width: 100%;
      max-height: none;
    }
    #overlay .media-duo { display: block; }
    #overlay .media-duo .media:nth-child(1),
    #overlay .media-duo .media:nth-child(2),
    #overlay .media-duo.flip .media:nth-child(1),
    #overlay .media-duo.flip .media:nth-child(2) {
      margin: 0 0 20px;
    }
    #overlay .media-duo .media img,
    #overlay .media-duo .media video {
      width: 100%;
      max-height: none;
      margin: 0;
    }
    #overlay .inner > .media.alt-left.edge { margin-left: -16px; }
    #overlay .inner > .media.alt-right.edge { margin-right: -16px; }
    #overlay .media-grid.cols-2 { grid-template-columns: 1fr; gap: 20px; }
    #overlay .media-grid.cols-3,
    #overlay .media-grid.cols-4,
    #overlay .media-grid.cols-5 { grid-template-columns: repeat(2, 1fr); gap: 12px; }
    #overlay .media-grid.cols-6 { grid-template-columns: repeat(2, 1fr); padding: 0; gap: 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="rule short"></div>
  <span class="name">Samuel Di Liberto</span>
  <div class="rule"></div>
  <a id="nav-work">Work</a>
  <div class="rule"></div>
  <a id="nav-about">About</a>
  <div class="rule"></div>
  <a id="nav-code">Code</a>
  <div class="rule short"></div>
</header>

<div id="stage">
  <svg id="wires">
    <defs>
      <!-- same sweep as the nav bars, stretched across the stage -->
      <linearGradient id="wireGrad" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1400" y2="0">
        <stop offset="0%"   stop-color="#BBE8F9"/>
        <stop offset="100%" stop-color="#C0FFB3"/>
      </linearGradient>
    </defs>
  </svg>
</div>

<!-- mobile home: stacked project index (replaces the network) -->
<div id="mobile-home"></div>

<!-- hover detail card -->
<div id="detail">
  <div class="head"><span class="t"></span><span class="n"></span></div>
  <div class="img"></div>
  <div class="desc"></div>
</div>

<!-- project page (also reused for About) — navigate back via "Work" -->
<div id="overlay">
  <div class="inner"></div>
</div>

<script>
/* ==================================================================
   CONFIG — everything editable lives here
   ================================================================== */

const SETTINGS = {
  codeUrl: "https://github.com/yourusername",   // "Code" nav link
  about: `<p>Hi, I'm Sam</p>
    <p>A designer working in experience and interactive design, with deep
    knowledge in 3D motion and an ongoing appetite for teaching myself
    machine learning and mathematics. The psychology of human movement and
    interaction sits at the front of everything I make — it's the lens I
    return to in every decision. I've worked on projects for clients like
    IBM, Apple, and Xsolla, spanning interactive experiences, brand systems,
    and 3D motion.</p>
    <p>I'm interested in where my technical skill meets conceptual depth,
    pairing how things are built with why they matter. I have an innate
    sense for designing around a user, and an interest towards future-led
    technology that's steering me increasingly towards AI research and
    mathematics, always with design in mind, whether spatial, on-screen,
    or somewhere between.</p>
    <p>I love understanding how things work at a deeper level, and using
    that to encourage deeper thinking in others. So much of what we do is
    muscle memory, unexamined, and it shouldn't be. I believe in slowing
    down, and following a path continuously shaped by our experiences.
    I hope my work can foster that kind of reflection.</p>
    <p>Ultimately, I want what I make to be used for good and to teach

   ENGINE — no need to edit below to add projects
   ================================================================== */

const stage   = document.getElementById("stage");
const wires   = document.getElementById("wires");
const detail  = document.getElementById("detail");
const overlay = document.getElementById("overlay");

const flat = [];          // { node, el, x, y } — filled by layout()
const edges = [];         // { path, a, b }

let S = 160;              // current node size — computed in layout()

function maxNodeSize() {
  return parseFloat(getComputedStyle(document.documentElement)
    .getPropertyValue("--node-size"));
}

/* thumbnail markup shared by neuron / detail / overlay */
function media(node) {
  if (node.image) return `<img src="${node.image}" alt="${node.title}">`;
  return `<div class="grad" style="background:${node.gradient}"></div>`;
}

/* ---------- build DOM once ---------- */
function build() {
  LAYERS.forEach((layer, li) => {
    layer.forEach((node, ni) => {
      const el = document.createElement("div");
      el.className = "neuron";
      el.innerHTML = `<div class="card">
                        <div class="head"><span class="t">${node.title}</span><span class="n">${node.num}</span></div>
                        <div class="thumb">${media(node)}</div>
                      </div>`;
      // organic float: varied duration + phase per node
      el.style.animationDuration = (5 + Math.random() * 3).toFixed(2) + "s";
      el.style.animationDelay = (-Math.random() * 5).toFixed(2) + "s";
      el.addEventListener("mouseenter", () => showDetail(node, el));
      el.addEventListener("mouseleave", hideDetail);
      el.addEventListener("click", () => openProject(node));
      stage.appendChild(el);
      flat.push({ node, el, layer: li, index: ni, x: 0, y: 0 });
    });
  });

  // fully connect adjacent layers
  let offset = 0;
  for (let li = 0; li < LAYERS.length - 1; li++) {
    const aStart = offset;
    const bStart = offset + LAYERS[li].length;
    for (let i = 0; i < LAYERS[li].length; i++) {
      for (let j = 0; j < LAYERS[li + 1].length; j++) {
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        wires.appendChild(path);
        edges.push({ path, a: aStart + i, b: bStart + j });
      }
    }
    offset += LAYERS[li].length;
  }
}

/* ---------- layout: positions adapt to any node/layer count ---------- */
function layout() {
  const W = stage.clientWidth;
  const H = stage.clientHeight;
  if (!W || !H) return;   // stage hidden (mobile view) — sizes are meaningless
  const mx = Math.max(40, W * 0.075);   // horizontal margin
  const my = Math.max(30, H * 0.08);    // vertical margin
  const cols = LAYERS.length;
  const gap = 28;                       // minimum breathing room between cards

  // shrink cards if the densest layer would otherwise touch
  const maxCount = Math.max(...LAYERS.map(l => l.length));
  S = Math.min(maxNodeSize(),
    (H - 2 * my - (maxCount - 1) * gap) / maxCount);

  flat.forEach(item => {
    item.el.style.width  = S + "px";
    item.el.style.height = S + "px";
    const colX = cols === 1
      ? W / 2 - S / 2
      : mx + (item.layer * (W - 2 * mx - S)) / (cols - 1);
    const count = LAYERS[item.layer].length;
    const availH = H - 2 * my - S;
    const rowY = count === 1
      ? my + availH / 2
      : my + (item.index * availH) / (count - 1);

    item.x = colX;
    item.y = rowY;
    item.el.style.left = colX + "px";
    item.el.style.top  = rowY + "px";
  });

  wires.setAttribute("viewBox", `0 0 ${W} ${H}`);
  document.getElementById("wireGrad").setAttribute("x2", W);
  drawEdges();
}

/* ---------- smooth horizontal bezier connections ---------- */
function drawEdges() {
  edges.forEach(e => {
    const a = flat[e.a], b = flat[e.b];
    const x1 = a.x + S, y1 = a.y + S / 2;
    const x2 = b.x,     y2 = b.y + S / 2;
    const c  = (x2 - x1) * 0.55;
    e.path.setAttribute("d",
      `M ${x1} ${y1} C ${x1 + c} ${y1}, ${x2 - c} ${y2}, ${x2} ${y2}`);
  });
}

/* ---------- hover detail card ---------- */
function showDetail(node, el) {
  detail.querySelector(".t").textContent = node.title;
  detail.querySelector(".n").textContent = node.num;
  detail.querySelector(".img").innerHTML = media(node);
  detail.querySelector(".desc").textContent = node.description;
  detail.classList.add("show");
  // light up this node's connections
  const idx = flat.findIndex(f => f.el === el);
  edges.forEach(e => e.path.classList.toggle("lit", e.a === idx || e.b === idx));
}
function hideDetail() {
  detail.classList.remove("show");
  edges.forEach(e => e.path.classList.remove("lit"));
}

/* ---------- expanded project page ----------
   Default layout: large text lead → full-width hero (like the mockups).
   For richer pages, give a node a `page` array mixing sections in order:
     page: [
       { type: "text",  html: "<p>Large display copy…</p>" },
       { type: "media", src: "images/hero.jpg" },            // full-width
       { type: "duo",   srcs: ["a.jpg", "b.jpg"] },          // staggered pair
       { type: "duo",   srcs: ["c.jpg", "d.jpg"], flip: true }, // mirrored
       { type: "grid",  srcs: ["e.jpg", "f.jpg", "g.jpg"] }  // equal columns
     ]
   Omit `src`/use null in srcs to show the project gradient instead. */
/* only these clips contain an audio track — everything else stays buttonless */
const HAS_SOUND = new Set([
  "images/on/D-AD-FINAL-FILM.mp4",
  "images/lunara/Comp-1_2.mp4",
  "images/spaces/CI_003_SDxNK_4x5_v11.mp4",
  "images/taste/250915_NK_386_CI006_fractals_v06 (2).mp4",
  "images/degree_show/Degree-Show-Announcement-Video-16x9.mp4",
]);

function mediaBlock(src, gradient, sound) {
  let inner;
  if (!src)
    inner = `<div class="grad" style="background:${gradient}"></div>`;
  else if (/\.(mov|mp4|webm)$/i.test(src)) {
    inner = `<video src="${encodeURI(src)}" autoplay loop muted playsinline></video>`;
    if (sound && HAS_SOUND.has(src))
      inner += `<button class="sound-btn" onclick="toggleSound(this)">Sound</button>`;
  }
  else
    inner = `<img src="${encodeURI(src)}" alt="">`;
  return `<div class="media">${inner}</div>`;
}

/* un-mute / re-mute a video via its overlay button */
function toggleSound(btn) {
  const v = btn.closest(".media").querySelector("video");
  if (!v) return;
  v.muted = !v.muted;
  if (!v.muted) { v.volume = 1; v.play(); }
  btn.textContent = v.muted ? "Sound" : "Mute";
  btn.classList.toggle("on", !v.muted);
}

/* pin each sound button to the bottom-left corner of its video
   (videos can be narrower than their .media block) */
function placeSoundBtns() {
  document.querySelectorAll("#overlay .sound-btn").forEach(btn => {
    const m = btn.closest(".media"), v = m.querySelector("video");
    if (!v) return;
    const mr = m.getBoundingClientRect(), vr = v.getBoundingClientRect();
    btn.style.left = (vr.left - mr.left + 14) + "px";
    btn.style.bottom = (mr.bottom - vr.bottom + 14) + "px";
  });
}

function renderPage(node) {
  let html = `<div class="topline"><h1>${node.title}</h1>` +
    `<span class="client">${node.client || node.year || ""}</span></div>`;
  const sections = node.page || [
    { type: "text",  html: node.body || node.description },
    { type: "media", src: node.image, gradient: node.gradient },
  ];
  // sound toggle on videos everywhere except the Xsolla page
  const sound = node.title !== "Xsolla";
  // first media goes full-bleed — unless the node opts out (noBleed: true)
  let firstMedia = !node.noBleed;
  let sideCount = 0;              // alternates standalone media left/right
  sections.forEach(s => {
    if (s.type === "text")
      html += `<div class="section-text">` +
        (s.heading ? `<span class="sec-head">${s.heading}</span>` : "") +
        `${s.html}</div>`;
    else if (s.type === "media") {
      const block = mediaBlock(s.src, s.gradient || node.gradient, sound);
      if (firstMedia) {
        html += block.replace('class="media"',
          'class="media bleed' + (node.heroCrop ? ' crop' : '') + '"');
      } else if (s.align === "center") {
        html += block;             /* stays centred, no side alternation */
      } else {
        /* side: "left"/"right" forces a side; edge: true bleeds to the
           viewport edge on that side */
        const side = s.side ? "alt-" + s.side
          : (sideCount++ % 2 ? "alt-right" : "alt-left");
        html += block.replace('class="media"',
          'class="media ' + side + (s.edge ? " edge" : "") + '"');
      }
      firstMedia = false;
    }
    else if (s.type === "duo") {
      html += `<div class="media-duo${s.flip ? " flip" : ""}">` +
        s.srcs.slice(0, 2).map(src => mediaBlock(src, node.gradient, sound)).join("") +
        `</div>`;
      firstMedia = false;
    }
    else if (s.type === "grid") {
      html += `<div class="media-grid${s.cols ? " cols-" + s.cols : ""}">` +
        s.srcs.map(src => mediaBlock(src, node.gradient, sound)).join("") + `</div>`;
      firstMedia = false;
    }
  });
  /* optional credits block: credits: { "For": "…", "Year": "…", … } */
  if (node.credits)
    html += `<div class="credits">` +
      Object.entries(node.credits).map(([k, v]) =>
        `<div class="row"><span class="k">${k}</span><span class="v">${v}</span></div>`
      ).join("") + `</div>`;
  return html;
}

/* ---------- page navigation (hash-routed, feels like separate pages) --- */
const navWork  = document.getElementById("nav-work");
const navAbout = document.getElementById("nav-about");
const navCode  = document.getElementById("nav-code");
let currentSlug = "";

function setActive(el) {
  [navWork, navAbout, navCode].forEach(a => a.classList.toggle("active", a === el));
}

function slugOf(t) {
  return t.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
}

function showPage(html) {
  overlay.querySelector(".inner").innerHTML = html;
  overlay.classList.add("show");
  document.body.classList.add("page-open");
  overlay.scrollTop = 0;
  document.querySelector("header").classList.remove("hidden");
  lastScrollY = 0;
  hideDetail();
  /* keep sound buttons pinned to their videos once sizes are known */
  overlay.querySelectorAll("video").forEach(v =>
    v.addEventListener("loadeddata", placeSoundBtns));
  placeSoundBtns();
}

/* header slides away on scroll down, returns on scroll up */
let lastScrollY = 0;
overlay.addEventListener("scroll", () => {
  if (!overlay.classList.contains("show")) return;   // only while a page is open
  const y = overlay.scrollTop;
  const header = document.querySelector("header");
  if (y > lastScrollY + 6 && y > 120) header.classList.add("hidden");
  else if (y < lastScrollY - 6 || y <= 120) header.classList.remove("hidden");
  lastScrollY = y;
});

function openProject(node, push = true) {
  const idx = flat.findIndex(f => f.node === node);
  const next = flat[(idx + 1) % flat.length].node;
  currentSlug = slugOf(node.title);
  showPage(renderPage(node) +
    `<div class="next"><span class="label">Next Project</span>` +
    `<a id="next-link">${next.title} →</a></div>`);
  overlay.querySelector("#next-link").addEventListener("click",
    () => openProject(next));
  setActive(navWork);
  if (push) location.hash = "/" + currentSlug;
}

  overlay.classList.remove("show");
  document.body.classList.remove("page-open");
  document.querySelector("header").classList.remove("hidden");  // always back on home
  setActive(navWork);
  if (clearHash && location.hash)
    history.pushState(null, "", location.pathname);
}

document.addEventListener("keydown", e => {
  if (e.key === "Escape") closePage();
});

setActive(navWork);
navCode.addEventListener("click", () => openCode());
navWork.addEventListener("click", () => closePage());
navAbout.addEventListener("click", () => openAbout());

/* browser back / forward + deep links (#/lunara, #/about) */
function route(push) {
  const s = location.hash.replace(/^#\//, "");
  if (!s) { if (currentSlug) closePage(false); return; }
  if (s === currentSlug) return;
  if (s === "about") { openAbout(push); return; }
  if (s === "code")  { openCode(push);  return; }
  const f = flat.find(f => slugOf(f.node.title) === s);
  if (f) openProject(f.node, push);
}
window.addEventListener("hashchange", () => route(false));

/* ---------- adaptive card colour ----------
   Samples each image: the card frame takes on a pale complementary tint
   of the image's average colour, and the title flips to white when the
   area behind it is dark. Fails silently (keeps defaults) if the image
   host blocks cross-origin reads. Override per node with tone:"dark". */
function adaptToImages() {
  flat.forEach(item => {
    const n = item.node;
    if (n.tone === "dark") { item.el.classList.add("dark-img"); }
    if (!n.image) return;
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
      try {
        const c = document.createElement("canvas");
        c.width = c.height = 32;
        const ctx = c.getContext("2d");
        ctx.drawImage(img, 0, 0, 32, 32);
        // average colour of whole image → pale tint for the card frame
        const all = ctx.getImageData(0, 0, 32, 32).data;
        let r = 0, g = 0, b = 0;
        for (let i = 0; i < all.length; i += 4) { r += all[i]; g += all[i+1]; b += all[i+2]; }
        const px = all.length / 4;
        r /= px; g /= px; b /= px;
        const mix = (v) => Math.round(v * 0.14 + 255 * 0.86);   // 86% white
        item.el.querySelector(".card").style.background =
          `rgb(${mix(r)}, ${mix(g)}, ${mix(b)})`;
        // luminance of the top strip (behind the title) → text colour
        const top = ctx.getImageData(0, 0, 32, 8).data;
        let lum = 0;
        for (let i = 0; i < top.length; i += 4)
          lum += 0.2126 * top[i] + 0.7152 * top[i+1] + 0.0722 * top[i+2];
        lum /= (top.length / 4) * 255;
        if (!n.tone)               /* explicit tone always wins over sampling */
          item.el.classList.toggle("dark-img", lum < 0.55);
      } catch (e) { /* cross-origin — keep defaults */ }
    };
    img.src = n.image;
  });
}

/* ---------- title pills hug their wrapped text ----------
   an inline-block that wraps expands to full width; this measures the
   widest rendered line and shrinks the pill to fit it */
function fitTitles() {
  document.querySelectorAll(".neuron .head .t").forEach(t => {
    t.style.width = "";
    const range = document.createRange();
    range.selectNodeContents(t);
    const rects = Array.from(range.getClientRects());
    if (rects.length > 1) {
      const w = Math.max(...rects.map(r => r.width));
      t.style.width = Math.ceil(w) + 22 + "px";   /* + padding & border */
    }
  });
}

/* ---------- go ---------- */
build();

/* ---------- mobile home: stacked tendril-style project index ---------- */
const MOBILE_ORDER = [
  "Xsolla",
  "Taste is our scarcest asset",
  "Lunara",
  "Spaces That Listen",
  "ON — Not Faster, Better",
  "Every Which Way",
  "Permeable",
  "Retainer Theory",
];
(function buildMobileHome() {
  const host = document.getElementById("mobile-home");
  if (!host) return;
  LAYERS.flat().slice()
    .sort((a, b) => MOBILE_ORDER.indexOf(a.title) - MOBILE_ORDER.indexOf(b.title))
    .forEach(node => {
      const t = document.createElement("div");
      t.className = "m-tile";
      t.innerHTML = `<div class="m-media">${media(node)}</div>` +
        `<div class="m-cap"><span class="m-t">${node.title}</span>` +
        `<span class="m-c">${node.client || node.year || ""}</span></div>`;
      t.addEventListener("click", () => openProject(node));
      host.appendChild(t);
    });
})();
layout();
adaptToImages();
if (document.fonts && document.fonts.ready)
  document.fonts.ready.then(fitTitles);
else fitTitles();
route(false);                       // open deep link if present
window.addEventListener("resize", () => { layout(); fitTitles(); placeSoundBtns(); });

/* re-layout cleanly when crossing the mobile/desktop breakpoint */
const mobileMQ = window.matchMedia("(max-width: 820px)");
(mobileMQ.addEventListener
  ? mobileMQ.addEventListener.bind(mobileMQ, "change")
  : mobileMQ.addListener.bind(mobileMQ))(() => {
  hideDetail();
  requestAnimationFrame(() => { layout(); fitTitles(); placeSoundBtns(); });
});
</script>
</body>
